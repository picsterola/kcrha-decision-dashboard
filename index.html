    <script>
      // Pre-hydration theme bootstrap to prevent flash of incorrect theme.
      (function () {
        try {
          var stored = window.localStorage.getItem("kcrha-theme");
          var prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var theme = stored === "light" || stored === "dark"
            ? stored
            : prefersLight
            ? "light"
            : "dark";
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          // localStorage may be blocked in sandboxed iframes — default to dark
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
